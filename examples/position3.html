<h3>ABSOLUTE WITHOUT POSITIONED PARENT</h3>
<p>With no positioned ancestor, the element positions relative to the page itself.</p>

<div class="outer">

    <p>I am inside the box.</p>

    <div data-label-element class="escaped">I escaped!</div>

</div>

<style>
    body { font-family: sans-serif; padding: 60px 20px 20px; }
    p { font-size: 0.9em; color: #555; margin-bottom: 10px; }

    .outer {
        border: 5px dashed gray; /**no position: relative — not an anchor**/
        padding: 20px;
        width: 250px;
    }

    .escaped {
        position: absolute; /**no positioned ancestor — anchors to the page**/
        top: 10px;
        right: 10px;
        background: lightyellow;
        border: 3px dashed orange;
        padding: 8px 12px;
    }
</style>
